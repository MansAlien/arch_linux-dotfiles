# ── Colors ────────────────────────────────────────────
set $bg      #1e1e2e
set $surface #313244
set $fg      #cdd6f4
set $muted   #6c7086
set $accent  #89b4fa
set $urgent  #f38ba8

client.focused          $accent   $surface  $fg     $accent    $accent
client.focused_inactive $surface  $surface  $muted  $surface   $surface
client.unfocused        $bg       $bg       $muted  $bg        $bg
client.urgent           $urgent   $urgent   $bg     $urgent    $urgent
