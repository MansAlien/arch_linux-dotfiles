[colors]
bg      = #1e1e2e
surface = #313244
fg      = #cdd6f4
muted   = #6c7086
accent  = #89b4fa
green   = #a6e3a1
yellow  = #f9e2af
red     = #f38ba8

[bar/main]
width            = 100%
height           = 28
radius           = 0
background       = ${colors.bg}
foreground       = ${colors.fg}

offset-y = 4


font-0 = JetBrainsMono Nerd Font:size=10;2
font-1 = JetBrainsMono Nerd Font:size=14;2

padding-left     = 1
padding-right    = 2
module-margin    = 1

separator        = %{F#6c7086} | %{F-}
separator-margin = 0

modules-left = i3 app-browser app-editor app-lutris app-files 
modules-center = date
modules-right  = cpu memory disk wifi volume battery tray powermenu

cursor-click = pointer

[module/powermenu]
type = custom/text
label = "⏻"
label-foreground = ${colors.red}
label-padding = 1
click-left = ~/.config/polybar/powermenu.sh

[module/tray]
type = internal/tray
tray-spacing = 4px
tray-background = ${colors.bg}
tray-padding = 4px

[module/i3]
type            = internal/i3
format          = <label-state>
index-sort      = true
wrapping-scroll = false

label-focused            = %index%
label-focused-foreground = ${colors.bg}
label-focused-background = ${colors.accent}
label-focused-padding    = 2

label-unfocused          = %index%
label-unfocused-foreground = ${colors.muted}
label-unfocused-padding  = 2

label-urgent             = %index%
label-urgent-foreground  = ${colors.bg}
label-urgent-background  = ${colors.red}
label-urgent-padding     = 2

# apps ------------------------------------------------------------

[module/app-browser]
type = custom/text
label = ""
label-foreground = ${colors.accent}
label-padding = 1
click-left = brave
label-font = 2

[module/app-lutris]
type = custom/text
label = ""
label-foreground = ${colors.accent}
label-padding = 1
click-left = lutris
label-font = 2

[module/app-files]
type = custom/text
label = "󰉋"
label-foreground = ${colors.accent}
label-padding = 1
click-left = thunar
label-font = 2

[module/app-editor]
type = custom/text
label = ""
label-foreground = ${colors.accent}
label-padding = 1
click-left = antigravity
label-font = 2

# ------------------------------------------------------------

[module/date]
type     = internal/date
interval = 1
date     = %a %d %b
time     = %I:%M %p
label    = 󰃰 %date%  %time%
label-foreground = ${colors.fg}

[module/cpu]
type                     = internal/cpu
interval                 = 2
format-prefix            = "󰍛 "
format-prefix-foreground = ${colors.accent}
label                    = %percentage%%

[module/memory]
type                     = internal/memory
interval                 = 3
format-prefix            = "󰾆 "
format-prefix-foreground = ${colors.accent}
label                    = %mb_used%

[module/disk]
type                          = internal/fs
interval                      = 30
mount-0                       = /
format-mounted-prefix         = "󰋊 "
format-mounted-prefix-foreground = ${colors.accent}
label-mounted                 = %free% free
format-warn-prefix            = "󰋊 "
format-warn-prefix-foreground = ${colors.red}
label-warn                    = %free% free
label-warn-foreground         = ${colors.red}
warn-percentage               = 90

[module/wifi]
type                        = internal/network
interface-type              = wireless
interval                    = 3

format-connected            = <ramp-signal> <label-connected>
label-connected             = %essid% %signal%%
label-connected-foreground  = ${colors.fg}

format-disconnected         = <label-disconnected>
label-disconnected          = "󰤭  disconnected"
label-disconnected-foreground = ${colors.red}

ramp-signal-0               = 󰤯
ramp-signal-1               = 󰤟
ramp-signal-2               = 󰤢
ramp-signal-3               = 󰤥
ramp-signal-4               = 󰤨
ramp-signal-foreground      = ${colors.accent}

[module/volume]
type                         = internal/pulseaudio
format-volume-prefix         = "󰕾 "
format-volume-prefix-foreground = ${colors.accent}
label-volume                 = %percentage%%
format-muted-prefix          = "󰖁 "
format-muted-prefix-foreground = ${colors.muted}
label-muted                  = muted
label-muted-foreground       = ${colors.muted}

[module/battery]
type                         = internal/battery
battery                      = BAT1
adapter                      = ACAD
full-at                      = 99
poll-interval                = 5

format-charging              = <animation-charging> <label-charging>
format-discharging           = <ramp-capacity> <label-discharging>
format-full                  = <label-full>
format-low                   = <label-low>

label-charging               = %percentage%%
label-discharging            = %percentage%% %time%
label-full                   = "󰁹 Full"
label-full-foreground        = ${colors.green}
label-low                    = "󰂎 %percentage%%"
label-low-foreground         = ${colors.red}
low-at                       = 20

; discharging icons 0-100%
ramp-capacity-0              = 󰁺
ramp-capacity-1              = 󰁻
ramp-capacity-2              = 󰁼
ramp-capacity-3              = 󰁽
ramp-capacity-4              = 󰁾
ramp-capacity-5              = 󰁿
ramp-capacity-6              = 󰂀
ramp-capacity-7              = 󰂁
ramp-capacity-8              = 󰂂
ramp-capacity-9              = 󰁹
ramp-capacity-foreground     = ${colors.accent}

; charging animation icons
animation-charging-0         = 󰢜
animation-charging-1         = 󰂆
animation-charging-2         = 󰂇
animation-charging-3         = 󰂈
animation-charging-4         = 󰢝
animation-charging-5         = 󰂉
animation-charging-6         = 󰢞
animation-charging-7         = 󰂊
animation-charging-8         = 󰂋
animation-charging-9         = 󰂅
animation-charging-foreground  = ${colors.green}
animation-charging-framerate   = 750

format-charging-foreground   = ${colors.green}
format-discharging-foreground = ${colors.fg}
format-low-foreground        = ${colors.red}
